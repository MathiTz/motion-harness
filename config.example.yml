# Motion Harness Configuration

# General Settings
workspace_path: "/Users/user/Documents/projects/motion-harness"
default_theme: "one_dark"
max_parallel_tasks: null  # Set to integer to override CPU-based auto-scaling

# Provider Configuration
# Providers with a "models" list share endpoint/api_key/type across models.
# Use provider_id/model_name to pick a specific model (e.g. ollama-cloud/gemma3:12b).
# API keys can be set here or via environment variables:
#   ANTHROPIC_API_KEY, OPENAI_API_KEY, OLLAMA_API_KEY, PROXY_API_KEY
providers:
  default: "ollama-cloud"

  ollama-cloud:
    name: "Ollama Cloud"
    endpoint: "https://ollama.com/v1"
    api_key: null  # Set via OLLAMA_API_KEY env var
    provider_type: "cloud"
    default_model: "gemma3:12b"
    models:
      gemma3:12b:
        temperature: 0.7
        max_tokens: 4096
      deepseek-v4-flash:
        temperature: 0.7
        max_tokens: 4096
      qwen3-coder:480b:
        temperature: 0.5
        max_tokens: 8192
      nematron-3-super:
        temperature: 0.7
        max_tokens: 4096
      glm-5.2:
        temperature: 0.7
        max_tokens: 4096
      gemma4:31b:
        temperature: 0.7
        max_tokens: 4096
      qwen3.5:397b:
        temperature: 0.7
        max_tokens: 4096
      glm-5.1:
        temperature: 0.7
        max_tokens: 4096
      minimax-m2.7:
        temperature: 0.7
        max_tokens: 4096

  claude-3-5:
    name: "Claude 3.5 Sonnet"
    endpoint: "https://api.anthropic.com"
    api_key: null  # Set via ANTHROPIC_API_KEY env var
    provider_type: "cloud"
    options:
      model: "claude-3-5-sonnet-20241022"
      temperature: 0.7
      max_tokens: 4096

  local-llama:
    name: "Llama 3 (Local)"
    endpoint: "http://localhost:11434"
    api_key: null
    provider_type: "local"
    options:
      model: "llama3"
      temperature: 0.6
      embed_model: "nomic-embed-text"

  gpt-4o:
    name: "GPT-4o"
    endpoint: "https://api.openai.com/v1"
    api_key: null  # Set via OPENAI_API_KEY env var
    provider_type: "cloud"
    options:
      model: "gpt-4o"
      temperature: 0.8
      max_tokens: 4096

# Embedding configuration
# Local providers use Ollama /api/embeddings; cloud-only setups
# fall back to a deterministic hash-based vector.
embedding:
  provider: "local-llama"
  dimension: 128
